# 先把所有日志/控制台关掉（很多卡死发生在串口/console init）
CONFIG_LOG=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_SERIAL=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_SHELL_BACKEND_RTT=n
# Deferred log + DROP + small RTT buffer can silently lose LOG_* under load or if the host
# does not drain RTT; immediate mode prints at call site (easier to debug heartbeat loops).
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_LOG_BACKEND_RTT_MODE_DROP=y
CONFIG_LOG_BACKEND_RTT_MESSAGE_SIZE=128

# printk/printf 支持 float
CONFIG_CBPRINTF_NANO=n
CONFIG_CBPRINTF_FP_SUPPORT=y

# flash / NVS / settings 全关
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n
CONFIG_NVS=n
CONFIG_SETTINGS=n
CONFIG_FCB=n

# FatFs (ELM) — 纯库，不依赖 Zephyr SD/SPI/diskaccess 驱动
# SD SPI 协议和磁盘 I/O 完全在 driver/file.c 里自己实现
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_MAX_LFN=255
CONFIG_FS_FATFS_MOUNT_MKFS=y
CONFIG_FS_FATFS_CUSTOM_MOUNT_POINT_COUNT=1
CONFIG_FS_FATFS_CUSTOM_MOUNT_POINTS="0"

# nrfx SPIM (nRF 原生 SPI，不走 Zephyr spi 驱动)
# spi00 在 DTS 里保持 disabled，防止 Zephyr 抢占外设
# CONFIG_NRFX_SPIM=y  # 已改用 Zephyr SPI 驱动

# Zephyr SPI + DAC 驱动（用于 DAC80501-SPI）
CONFIG_SPI=y
CONFIG_DAC=y

# 不启用 Zephyr 的 SD/MMC/diskaccess 栈
# CONFIG_DISK_DRIVER_SDMMC 和 CONFIG_SDMMC_STACK 均不开启

# 先别让任何低频时钟/外设复杂初始化影响（RC 32k，稳定）
# CONFIG_CLOCK_CONTROL=y
# CONFIG_CLOCK_CONTROL_NRF=y
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_SYNTH=n

###########################################################

################################
# Bluetooth Core
################################
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="MinNeuro R1"

################################
# GATT / 需要 MTU 交换
################################
CONFIG_BT_GATT_CLIENT=y

################################
# PHY / DLE
################################
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_USER_PHY_UPDATE=y

CONFIG_BT_USER_DATA_LEN_UPDATE=y
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

################################
# MTU = 500（关键）
################################
CONFIG_BT_L2CAP_TX_MTU=500


# ATT MTU 交换：两边都至少 503（ATT=MTU，L2CAP/SDU 还要开销）
# Zephyr 的 ATT MTU 由 L2CAP_TX_MTU 驱动，但 buffer 也必须够
CONFIG_BT_BUF_ACL_TX_SIZE=500
CONFIG_BT_BUF_ACL_RX_SIZE=500

# 为了稳定，建议把 TX buffer 数量略抬高（默认有时不够导致 -ENOMEM）
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_EVT_RX_COUNT=11

# ATT TX pool buffer 数量（att_pool, 直接决定 K_NO_WAIT 下能否拿到 buffer）
# 默认 = BT_BUF_ACL_TX_COUNT。sys_work_q 上 notify 使用 K_NO_WAIT，
# 5ms × 2 char × 500B / 2M PHY pipeline 容易耗尽，需要显式扩大。
CONFIG_BT_ATT_TX_COUNT=10

################################
# Services
################################
CONFIG_BT_BAS=y
CONFIG_BT_DIS=y


################################
# DIS 信息（不走 settings）
################################
CONFIG_BT_DIS_PNP=n
CONFIG_BT_DIS_MODEL="MinNeuro R1"
CONFIG_BT_DIS_MANUF="MinNeuro"

CONFIG_BT_DIS_SERIAL_NUMBER=y
CONFIG_BT_DIS_SERIAL_NUMBER_STR="F.A000001"

CONFIG_BT_DIS_FW_REV=y
CONFIG_BT_DIS_FW_REV_STR="MinNeuro Firmware"
CONFIG_BT_DIS_HW_REV=y
CONFIG_BT_DIS_HW_REV_STR="MinNeuro Hardware"
CONFIG_BT_DIS_SW_REV=y
CONFIG_BT_DIS_SW_REV_STR="MinNeuro Software"

CONFIG_BT_DIS_STR_MAX=32

################################
# ❌ 明确关闭 settings（否则必炸）
################################
CONFIG_BT_SETTINGS=n
CONFIG_SETTINGS=n
CONFIG_BT_DIS_SETTINGS=n


################################
# CONFIG
################################

# looper_work_handler 运行于系统工作队列线程，适当加大其栈空间
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
# main 线程栈
CONFIG_MAIN_STACK_SIZE=2048

CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_PINCTRL=y
CONFIG_NRFX_SPIM=y
CONFIG_NRFX_SAADC=y
CONFIG_NRFX_SPIS=n

# CONFIG_NRFX_TIMER=y
